services:
  - type: web
    name: clickflow-api-staging
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health/ready
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase: { name: clickflow-postgres-staging, property: connectionString }
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
databases:
  - name: clickflow-postgres-staging
    databaseName: clickflow_staging
    user: clickflow
    plan: basic-256mb
    ipAllowList: []
