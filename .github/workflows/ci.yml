name: CI
on:
  pull_request:
  push:
    branches: [main, dev]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.24.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm --filter api openapi:check
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web exec playwright test

  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: clickflow, POSTGRES_PASSWORD: clickflow, POSTGRES_DB: clickflow_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U clickflow" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://clickflow:clickflow@localhost:5432/clickflow_test?schema=public
      DATABASE_INTEGRATION_TESTS: "1"
      JWT_ACCESS_SECRET: ci-access-secret-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.24.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api exec prisma migrate deploy
      - run: pnpm --filter api exec prisma migrate status
      - run: pnpm --filter api test:database
  security:
    runs-on: ubuntu-latest
    permissions: { contents: read, security-events: write }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.24.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - uses: aquasecurity/trivy-action@0.33.1
        with: { scan-type: fs, scan-ref: ., severity: HIGH,CRITICAL, exit-code: "1" }
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: { context: ., file: apps/api/Dockerfile, push: false, tags: clickflow-api:ci }
